<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workflow Chat Helper</title>
    <style>
      :root {
        --bg: #eef2f6;
        --widget-bg: #ffffff;
        --widget-border: #d7dde7;
        --header-bg: #1e293b;
        --header-text: #f8fafc;
        --text: #1f2937;
        --muted: #667085;
        --user-bg: #dbeafe;
        --assistant-bg: #f8fafc;
        --accent: #0ea5a5;
        --accent-2: #0284c7;
        --error: #dc2626;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
        background: linear-gradient(160deg, #f2f4f8 0%, #e5ecf5 100%);
        color: var(--text);
      }

      .page-shell {
        width: 100%;
        height: 100%;
        position: relative;
      }

      .helper-label {
        position: absolute;
        top: 12px;
        left: 16px;
        font-size: 12px;
        color: #64748b;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .chat-widget {
        position: fixed;
        right: 20px;
        bottom: 20px;
        width: min(430px, calc(100vw - 24px));
        height: min(680px, calc(100vh - 24px));
        border: 1px solid var(--widget-border);
        border-radius: 18px;
        background: var(--widget-bg);
        box-shadow:
          0 20px 48px rgba(15, 23, 42, 0.22),
          0 2px 8px rgba(15, 23, 42, 0.08);
        overflow: hidden;
        display: grid;
        grid-template-rows: auto auto 1fr auto;
      }

      .chat-widget.minimized {
        display: none;
      }

      .chat-header {
        background: var(--header-bg);
        color: var(--header-text);
        padding: 12px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .title-wrap {
        min-width: 0;
      }

      .chat-title {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chat-subtitle {
        margin: 2px 0 0;
        font-size: 11px;
        color: #c6d0de;
      }

      .header-actions {
        display: flex;
        gap: 6px;
      }

      .icon-btn {
        border: 0;
        width: 31px;
        height: 31px;
        border-radius: 9px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.12);
        color: var(--header-text);
      }

      .icon-btn:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .settings {
        padding: 12px;
        border-bottom: 1px solid #e5e7eb;
        background: #fbfdff;
        display: none;
        gap: 10px;
      }

      .settings.open {
        display: grid;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        font-size: 12px;
        color: #4b5563;
      }

      .field input {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 9px 10px;
        font: inherit;
      }

      .settings-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .btn {
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        background: #fff;
        color: #334155;
      }

      .btn.primary {
        border-color: #0284c7;
        background: #0284c7;
        color: #fff;
      }

      .status-line {
        padding: 9px 12px;
        font-size: 12px;
        color: var(--muted);
        border-bottom: 1px solid #e5e7eb;
        background: #ffffff;
      }

      .status-line.error {
        color: var(--error);
      }

      .status-line.ok {
        color: #0f766e;
      }

      .chat-log {
        min-height: 0;
        overflow: auto;
        padding: 14px 12px;
        display: grid;
        align-content: start;
        gap: 10px;
        background: #f7fafc;
      }

      .message {
        max-width: 88%;
        border: 1px solid #dbe4ef;
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 14px;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .message.user {
        justify-self: end;
        background: var(--user-bg);
        border-color: #bfdbfe;
      }

      .message.assistant {
        justify-self: start;
        background: var(--assistant-bg);
      }

      .message a {
        color: #0f6fd6;
        font-weight: 600;
      }

      .composer {
        border-top: 1px solid #e2e8f0;
        background: #fff;
        padding: 10px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }

      .composer textarea {
        min-height: 44px;
        max-height: 140px;
        resize: vertical;
        border: 2px solid #d7e2ef;
        border-radius: 10px;
        padding: 10px;
        font: inherit;
      }

      .send-btn {
        align-self: end;
        height: 44px;
        min-width: 44px;
        border-radius: 10px;
        border: 1px solid #0284c7;
        background: #0284c7;
        color: #fff;
        font-size: 18px;
        cursor: pointer;
      }

      .send-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .open-chat-btn {
        position: fixed;
        right: 20px;
        bottom: 20px;
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(2, 132, 199, 0.35);
        display: none;
      }

      .open-chat-btn.visible {
        display: inline-flex;
      }

      @media (max-width: 640px) {
        .chat-widget {
          right: 0;
          bottom: 0;
          width: 100vw;
          height: 100vh;
          border-radius: 0;
        }

        .open-chat-btn {
          right: 12px;
          bottom: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <div class="helper-label">Workflow Chat Helper</div>

      <section id="chatWidget" class="chat-widget" aria-label="Workflow Chat Helper">
        <header class="chat-header">
          <div class="title-wrap">
            <h1 class="chat-title">L2M Assistant</h1>
            <p class="chat-subtitle">Webhook chat</p>
          </div>
          <div class="header-actions">
            <button id="settingsBtn" class="icon-btn" title="Settings" type="button">&#9881;</button>
            <button id="newSessionBtn" class="icon-btn" title="New Session" type="button">&#10227;</button>
            <button id="minimizeBtn" class="icon-btn" title="Minimize" type="button">&#8722;</button>
          </div>
        </header>

        <section id="settingsPanel" class="settings" aria-label="Connection settings">
          <div class="field">
            <label for="apiBase">Base URL</label>
            <input id="apiBase" type="text" placeholder="http://localhost:4001" />
          </div>
          <div class="field">
            <label for="webhookPath">Webhook Path or Full URL</label>
            <input id="webhookPath" type="text" placeholder="/webhook-test/agent-demo" />
          </div>
          <div class="settings-actions">
            <button id="closeSettingsBtn" class="btn" type="button">Close</button>
            <button id="saveSettingsBtn" class="btn primary" type="button">Save</button>
          </div>
        </section>

        <div id="statusLine" class="status-line">Ready</div>
        <div id="chatLog" class="chat-log"></div>

        <footer class="composer">
          <textarea id="userInput" placeholder="Type your message"></textarea>
          <button id="sendBtn" class="send-btn" type="button" title="Send">&#8594;</button>
        </footer>
      </section>

      <button id="openChatBtn" class="open-chat-btn" type="button">Open chat</button>
    </div>

    <script>
      (() => {
        const STORAGE_KEY = "workflow-helper-chat-settings-v2";

        const chatWidgetEl = document.getElementById("chatWidget");
        const openChatBtn = document.getElementById("openChatBtn");
        const settingsBtn = document.getElementById("settingsBtn");
        const newSessionBtn = document.getElementById("newSessionBtn");
        const minimizeBtn = document.getElementById("minimizeBtn");
        const settingsPanelEl = document.getElementById("settingsPanel");
        const saveSettingsBtn = document.getElementById("saveSettingsBtn");
        const closeSettingsBtn = document.getElementById("closeSettingsBtn");
        const apiBaseEl = document.getElementById("apiBase");
        const webhookPathEl = document.getElementById("webhookPath");
        const statusLineEl = document.getElementById("statusLine");
        const chatLogEl = document.getElementById("chatLog");
        const userInputEl = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");

        let busy = false;
        let sessionId = "";

        function createSessionId() {
          if (window.crypto && typeof window.crypto.randomUUID === "function") {
            return `helper-${window.crypto.randomUUID()}`;
          }
          return `helper-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
        }

        function loadSettings() {
          const defaults = {
            apiBase: window.location.origin || "http://localhost:4001",
            webhookPath: "/webhook-test/agent-demo",
            sessionId: createSessionId(),
            minimized: false
          };
          try {
            const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
            return { ...defaults, ...parsed };
          } catch {
            return defaults;
          }
        }

        function saveSettings() {
          const payload = {
            apiBase: apiBaseEl.value.trim(),
            webhookPath: webhookPathEl.value.trim(),
            sessionId,
            minimized: chatWidgetEl.classList.contains("minimized")
          };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        }

        function normalizeBase(base) {
          return String(base || "").trim().replace(/\/+$/, "");
        }

        function buildWebhookUrl(base, pathOrUrl) {
          const input = String(pathOrUrl || "").trim();
          if (/^https?:\/\//i.test(input)) {
            return input;
          }
          const normalizedPath = input.startsWith("/") ? input : `/${input}`;
          return `${normalizeBase(base)}${normalizedPath}`;
        }

        function decodeBufferLikeText(value) {
          if (!value || typeof value !== "object" || Array.isArray(value)) return null;
          if (value.type !== "Buffer" || !Array.isArray(value.data)) return null;
          const bytes = value.data;
          if (!bytes.every((entry) => Number.isInteger(entry) && entry >= 0 && entry <= 255)) return null;
          try {
            return new TextDecoder("utf-8").decode(new Uint8Array(bytes));
          } catch {
            return null;
          }
        }

        function toJson(value) {
          try {
            return JSON.stringify(value ?? null, null, 2);
          } catch {
            return String(value);
          }
        }

        function extractAssistantText(payload) {
          const rootDecoded = decodeBufferLikeText(payload);
          if (typeof rootDecoded === "string") return rootDecoded;
          if (typeof payload === "string") return payload;
          if (payload && typeof payload === "object") {
            const output = payload.output;
            const decodedOutput = decodeBufferLikeText(output);
            if (typeof decodedOutput === "string") return decodedOutput;
            if (typeof output === "string") return output;
            if (output && typeof output === "object") {
              const outputCandidates = [output.result, output.answer, output.text, output.content];
              for (const candidate of outputCandidates) {
                const decoded = decodeBufferLikeText(candidate);
                if (typeof decoded === "string") return decoded;
                if (typeof candidate === "string" && candidate.trim()) return candidate;
              }
            }
            const rootCandidates = [payload.result, payload.answer, payload.text, payload.content];
            for (const candidate of rootCandidates) {
              const decoded = decodeBufferLikeText(candidate);
              if (typeof decoded === "string") return decoded;
              if (typeof candidate === "string" && candidate.trim()) return candidate;
            }
          }
          return toJson(payload);
        }

        function isPdfDataUrl(value) {
          return typeof value === "string" && /^data:application\/pdf;base64,/i.test(value.trim());
        }

        function addMessage(role, text) {
          const messageEl = document.createElement("div");
          messageEl.className = `message ${role}`;
          if (role === "assistant" && isPdfDataUrl(text)) {
            const link = document.createElement("a");
            link.href = text;
            link.download = "workflow-output.pdf";
            link.target = "_blank";
            link.rel = "noreferrer";
            link.textContent = "Download PDF";
            messageEl.appendChild(link);
          } else {
            messageEl.textContent = text || "";
          }
          chatLogEl.appendChild(messageEl);
          chatLogEl.scrollTop = chatLogEl.scrollHeight;
          return messageEl;
        }

        function setStatus(text, tone) {
          statusLineEl.textContent = text;
          statusLineEl.className = "status-line";
          if (tone === "ok") {
            statusLineEl.classList.add("ok");
          } else if (tone === "error") {
            statusLineEl.classList.add("error");
          }
        }

        function setMinimized(isMinimized) {
          if (isMinimized) {
            chatWidgetEl.classList.add("minimized");
            openChatBtn.classList.add("visible");
          } else {
            chatWidgetEl.classList.remove("minimized");
            openChatBtn.classList.remove("visible");
          }
          saveSettings();
        }

        function showWelcomeMessage() {
          if (chatLogEl.childElementCount > 0) {
            return;
          }
          addMessage(
            "assistant",
            "Hi, this is your workflow assistant. Send a prompt and I will call your configured webhook."
          );
        }

        async function sendMessage() {
          if (busy) return;
          const userPrompt = userInputEl.value.trim();
          if (!userPrompt) return;

          const base = apiBaseEl.value.trim();
          const webhookPath = webhookPathEl.value.trim();
          if (!base || !webhookPath) {
            setStatus("Set Base URL and Webhook Path in settings.", "error");
            return;
          }

          busy = true;
          sendBtn.disabled = true;

          addMessage("user", userPrompt);
          userInputEl.value = "";
          const pendingEl = addMessage("assistant", "Typing...");
          setStatus("Calling webhook...", "");

          const payload = {
            user_prompt: userPrompt,
            session_id: sessionId
          };

          try {
            const webhookUrl = buildWebhookUrl(base, webhookPath);
            const response = await fetch(webhookUrl, {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify(payload)
            });

            const raw = await response.text();
            let body = raw;
            try {
              body = raw ? JSON.parse(raw) : null;
            } catch {
              // leave as string
            }

            if (!response.ok) {
              const message = typeof body === "object" && body && body.error ? body.error : `Webhook failed (${response.status})`;
              throw new Error(message);
            }

            pendingEl.textContent = "";
            if (isPdfDataUrl(extractAssistantText(body))) {
              const link = document.createElement("a");
              link.href = extractAssistantText(body);
              link.download = "workflow-output.pdf";
              link.target = "_blank";
              link.rel = "noreferrer";
              link.textContent = "Download PDF";
              pendingEl.appendChild(link);
            } else {
              pendingEl.textContent = extractAssistantText(body);
            }
            setStatus("Response received.", "ok");
          } catch (error) {
            const message = error instanceof Error ? error.message : "Request failed.";
            pendingEl.textContent = `Error: ${message}`;
            setStatus(message, "error");
          } finally {
            busy = false;
            sendBtn.disabled = false;
            saveSettings();
          }
        }

        const initial = loadSettings();
        apiBaseEl.value = initial.apiBase;
        webhookPathEl.value = initial.webhookPath;
        sessionId = typeof initial.sessionId === "string" && initial.sessionId ? initial.sessionId : createSessionId();

        showWelcomeMessage();
        setMinimized(Boolean(initial.minimized));

        settingsBtn.addEventListener("click", () => {
          settingsPanelEl.classList.toggle("open");
        });

        saveSettingsBtn.addEventListener("click", () => {
          saveSettings();
          settingsPanelEl.classList.remove("open");
          setStatus("Settings saved.", "ok");
        });

        closeSettingsBtn.addEventListener("click", () => {
          settingsPanelEl.classList.remove("open");
        });

        newSessionBtn.addEventListener("click", () => {
          sessionId = createSessionId();
          addMessage("assistant", `New session started (${sessionId}).`);
          setStatus("Started new session.", "ok");
          saveSettings();
        });

        minimizeBtn.addEventListener("click", () => {
          setMinimized(true);
        });

        openChatBtn.addEventListener("click", () => {
          setMinimized(false);
        });

        sendBtn.addEventListener("click", () => {
          void sendMessage();
        });

        userInputEl.addEventListener("keydown", (event) => {
          if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            void sendMessage();
          }
        });
      })();
    </script>
  </body>
</html>
