{{- if .Values.webhook.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-orchestrator.fullname" . }}-webhook
  labels:
    {{- include "ai-orchestrator.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  replicas: {{ .Values.webhook.replicaCount }}
  selector:
    matchLabels:
      {{- include "ai-orchestrator.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: webhook
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "ai-orchestrator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: webhook
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "ai-orchestrator.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: webhook
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: WORKER_MODE
              value: "webhook"
            # Webhook replicas never become leader — they don't run
            # scheduler/trigger/queue work, so the lease would be wasted.
            - name: HA_ENABLED
              value: "false"
          envFrom:
            - configMapRef:
                name: {{ include "ai-orchestrator.configMapName" . }}
            - secretRef:
                name: {{ include "ai-orchestrator.secretName" . }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.webhook.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-orchestrator.fullname" . }}-webhook
  labels:
    {{- include "ai-orchestrator.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  type: {{ .Values.webhook.service.type }}
  ports:
    - port: {{ .Values.webhook.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ai-orchestrator.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
{{- end -}}
