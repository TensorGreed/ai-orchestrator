{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ai-orchestrator.fullname" . }}
  labels:
    {{- include "ai-orchestrator.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .service "webhook" }}
                name: {{ include "ai-orchestrator.fullname" $ }}-webhook
                port:
                  number: {{ $.Values.webhook.service.port }}
                {{- else if eq .service "web" }}
                name: {{ include "ai-orchestrator.fullname" $ }}-web
                port:
                  number: {{ $.Values.web.service.port }}
                {{- else }}
                name: {{ include "ai-orchestrator.fullname" $ }}-api
                port:
                  number: {{ $.Values.api.service.port }}
                {{- end }}
          {{- end }}
    {{- end }}
{{- end -}}
