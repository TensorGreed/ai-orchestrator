{{- if not .Values.secrets.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-orchestrator.secretName" . }}
  labels:
    {{- include "ai-orchestrator.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_MASTER_KEY_BASE64: {{ required "secrets.secretMasterKeyBase64 is required. Generate with: node -e 'console.log(require(\"crypto\").randomBytes(32).toString(\"base64\"))'" .Values.secrets.secretMasterKeyBase64 | quote }}
  {{- if .Values.secrets.databaseUrl }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.geminiApiKey }}
  GEMINI_API_KEY: {{ .Values.secrets.geminiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
{{- end -}}
