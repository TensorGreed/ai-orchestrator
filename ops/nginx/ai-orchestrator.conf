## Nginx routing for the docker-compose.prod.yml topology.
##
##   /webhook/*, /webhook-test/*, /api/webhooks/* → dedicated webhook replicas
##   /api/*, /widget.js, /health, /metrics        → round-robin across API replicas
##   /                                            → React Studio UI
##
## Place at ops/nginx/ai-orchestrator.conf — mounted into the nginx service
## at /etc/nginx/conf.d/default.conf.

upstream ao_api {
    server api-1:4000 max_fails=3 fail_timeout=10s;
    server api-2:4000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream ao_webhook {
    server webhook:4000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream ao_web {
    server web:80;
    keepalive 16;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 25m;

    # Signed/unauthenticated webhook ingress goes to dedicated replicas.
    location /webhook/ {
        proxy_pass         http://ao_webhook;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /webhook-test/ {
        proxy_pass         http://ao_webhook;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/webhooks/ {
        proxy_pass         http://ao_webhook;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Authenticated API + SSE streaming endpoints → round-robin across API replicas.
    location /api/ {
        proxy_pass         http://ao_api;
        proxy_http_version 1.1;
        proxy_buffering    off;               # SSE support
        proxy_read_timeout 3600s;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # Prometheus scrape + health probes hit whichever API replica answers.
    location = /metrics { proxy_pass http://ao_api; }
    location = /health  { proxy_pass http://ao_api; }
    location = /widget.js { proxy_pass http://ao_api; }

    # Everything else → static Studio UI.
    location / {
        proxy_pass       http://ao_web;
        proxy_set_header Host $host;
    }
}
